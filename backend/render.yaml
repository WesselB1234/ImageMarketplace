services:
  # 1. Gewijzigd naar een Background Worker om de poort-timeout te omzeilen
  - type: worker
    name: php-app
    env: docker
    dockerfilePath: PHP.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_HOST
        value: mysql
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: secret123 # Hardcoded om direct te matchen met de database hieronder
      - key: DB_DATABASE
        value: developmentdb
      - key: MYSQL_ROOT_PASSWORD
        value: secret123 # Zorgt dat het startscript in de Dockerfile kan inloggen

  # 2. De MySQL Private Service
  - type: pserv
    name: mysql
    env: docker
    dockerImage: mariadb:latest
    # LET OP: Verwijder de 'disk' sectie hieronder als je op het gratis plan zit!
    disk:
      name: mysqldata
      mountPath: /var/lib/mysql
      sizeGB: 1 
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: secret123 # Matcht nu exact met de php-app
      - key: MYSQL_USER
        value: root
      - key: MYSQL_PASSWORD
        value: secret123
      - key: MYSQL_DATABASE
        value: developmentdb

  # 3. phpMyAdmin Web Service
  - type: web
    name: phpmyadmin
    env: docker
    dockerImage: phpmyadmin:latest
    plan: free
    envVars:
      - key: PMA_HOST
        value: mysql
