databases:
  - name: myapp-db
    databaseName: developmentdb
    user: appuser
    plan: free

services:
  - type: web
    name: myapp-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: myapp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: myapp-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: myapp-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: myapp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: myapp-db
          property: password